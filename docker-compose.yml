services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sxf_db
      POSTGRES_USER: sxf_user
      POSTGRES_PASSWORD: sxf_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sxf_user -d sxf_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app
      - ./tests:/app/tests
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://sxf_user:sxf_pass@db:5432/sxf_db
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen(''http://localhost:8080/health'', timeout=3).status == 200 else 1)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
